<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Turnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:        #050d1a;
            --deep:        #091428;
            --mid:         #0d2347;
            --royal:       #1a3a6b;
            --accent:      #2563b8;
            --bright:      #4f8ef7;
            --gold:        #c9a84c;
            --gold-light:  #f0d080;
            --white:       #f0f4ff;
            --white-dim:   rgba(240,244,255,0.55);
            --white-ghost: rgba(240,244,255,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(26,58,107,0.55) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(37,99,184,0.3) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(9,20,40,0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top gold rule ── */
        .top-rule {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--gold) 20%, var(--gold-light) 50%, var(--gold) 80%, transparent 100%);
            z-index: 200;
        }

        /* ── Corner: recepcionista ── */
        #recepcionistaCorner {
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            padding: 28px 36px;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #recepcionistaCorner.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .corner-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--bright));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 18px; font-weight: 700; color: white;
            border: 2px solid rgba(79,142,247,0.4);
            box-shadow: 0 0 16px rgba(79,142,247,0.25);
            flex-shrink: 0;
        }

        .corner-info { display: flex; flex-direction: column; }
        .corner-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--bright); font-weight: 500; }
        .corner-name  { font-size: 15px; font-weight: 600; color: var(--white); letter-spacing: 0.03em; }

        /* ── Bottom status bar ── */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(5,13,26,0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--white-ghost);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            display: inline-block;
            margin-right: 8px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .status-text-bar { font-size: 12px; color: var(--white-dim); letter-spacing: 0.05em; }

        /* ── Main container ── */
        .container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ─── CONNECTING STATE ─── */
        #connectingState {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .spinner-ring {
            width: 72px; height: 72px;
            border: 3px solid var(--white-ghost);
            border-top-color: var(--bright);
            border-radius: 50%;
            animation: spin 1.4s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .connecting-label {
            font-size: 14px; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--white-dim); font-weight: 300;
        }

        /* ─── PENDING STATE ─── */
        #pendingState {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        .pending-header {
            font-size: 13px; letter-spacing: 0.3em;
            text-transform: uppercase; color: var(--bright); font-weight: 500;
        }

        .codigo-frame {
            position: relative;
            padding: 40px 64px;
            background: var(--white-ghost);
            border: 1px solid rgba(79,142,247,0.25);
            border-radius: 4px;
        }

        .codigo-frame::before, .codigo-frame::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--gold);
            border-style: solid;
        }

        .codigo-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .codigo-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        #codigoVinculacion {
            font-family: 'Playfair Display', serif;
            font-size: 88px; font-weight: 900;
            color: var(--gold-light);
            letter-spacing: 18px;
            text-shadow: 0 0 40px rgba(201,168,76,0.4);
            line-height: 1;
        }

        .pending-subtitle {
            font-size: 14px; color: var(--white-dim);
            letter-spacing: 0.05em; text-align: center; line-height: 1.7;
        }

        /* ─── LINKED STATE: SPLIT LAYOUT ─── */
        #linkedState {
            display: none;
            width: 100%;
            height: 100%;
        }

        .screen-split {
            display: flex;
            width: 100%;
            height: 100%;
            padding-bottom: 48px; /* status bar */
            padding-top: 3px;     /* top rule */
        }

        /* ══ LEFT PANEL — Turno actual ══ */
        .panel-left {
            flex: 0 0 58%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--white-ghost);
            position: relative;
            padding: 60px 48px 40px;
        }

        /* Vertical gold accent line */
        .panel-left::after {
            content: '';
            position: absolute;
            right: -1px; top: 15%; bottom: 15%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
        }

        .left-label {
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--bright);
            font-weight: 500;
            margin-bottom: 28px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .left-label.visible { opacity: 1; }

        .turno-codigo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(80px, 14vw, 160px);
            font-weight: 900;
            color: var(--white);
            letter-spacing: 6px;
            line-height: 0.9;
            text-shadow:
                0 0 60px rgba(79,142,247,0.35),
                0 20px 60px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.92);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .turno-codigo.visible {
            opacity: 1;
            transform: scale(1);
        }

        .turno-codigo.llamando {
            animation: llamar-pulse 0.8s ease-out;
        }

        @keyframes llamar-pulse {
            0%   { transform: scale(1); text-shadow: 0 0 60px rgba(79,142,247,0.35), 0 20px 60px rgba(0,0,0,0.5); }
            40%  { transform: scale(1.06); text-shadow: 0 0 100px rgba(79,142,247,0.8), 0 0 60px rgba(201,168,76,0.4); }
            100% { transform: scale(1); text-shadow: 0 0 60px rgba(79,142,247,0.35), 0 20px 60px rgba(0,0,0,0.5); }
        }

        .gold-divider {
            width: 1px; height: 0;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            margin: 24px auto;
            transition: height 0.6s ease 0.2s;
        }

        .gold-divider.visible { height: 60px; }

        .turno-nombre {
            font-size: clamp(18px, 3vw, 36px);
            font-weight: 300;
            color: var(--white-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.3s;
            text-align: center;
        }

        .turno-nombre.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Idle state dentro del panel izquierdo */
        .idle-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .idle-state.hidden { opacity: 0; pointer-events: none; position: absolute; }

        .idle-icon { font-size: 56px; opacity: 0.12; }
        .idle-text {
            font-size: 14px; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--white-ghost); font-weight: 300;
        }

        /* ══ RIGHT PANEL — Historial ══ */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 72px 32px 32px;
            overflow: hidden;
        }

        .history-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--white-ghost);
            flex-shrink: 0;
        }

        .history-title {
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--white-dim);
            font-weight: 500;
        }

        .history-count {
            background: var(--white-ghost);
            border: 1px solid rgba(79,142,247,0.2);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            color: var(--bright);
            font-weight: 600;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(79,142,247,0.3); border-radius: 2px; }

        .history-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--white-ghost);
            border: 1px solid rgba(79,142,247,0.1);
            border-radius: 4px;
            animation: slide-in 0.4s cubic-bezier(0.23, 1, 0.32, 1) both;
            transition: background 0.2s ease;
        }

        .history-item:hover {
            background: rgba(240,244,255,0.08);
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .history-item-num {
            font-size: 10px;
            color: var(--bright);
            font-weight: 600;
            letter-spacing: 0.1em;
            min-width: 24px;
            text-align: right;
        }

        .history-item-code {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 2px;
            flex: 1;
        }

        .history-item-name {
            font-size: 12px;
            color: var(--white-dim);
            font-weight: 300;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: right;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-time {
            font-size: 10px;
            color: rgba(240,244,255,0.3);
            letter-spacing: 0.05em;
            min-width: 44px;
            text-align: right;
        }

        .history-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            opacity: 0.25;
        }

        .history-empty-icon { font-size: 36px; }
        .history-empty-text { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white-dim); }

        /* ─── ERROR MESSAGE ─── */
        #errorMessage {
            background: rgba(180,30,30,0.15);
            border: 1px solid rgba(220,60,60,0.4);
            color: var(--white);
            padding: 28px 40px;
            border-radius: 4px;
            font-size: 16px;
            display: none;
            max-width: 600px;
            text-align: center;
            line-height: 1.7;
            backdrop-filter: blur(12px);
        }

        #errorMessage.show { display: block; }

        #ultimaActualizacion { font-size: 11px; color: var(--white-dim); letter-spacing: 0.05em; }

        @media (max-width: 768px) {
            .screen-split { flex-direction: column; }
            .panel-left { flex: 0 0 55%; border-right: none; border-bottom: 1px solid var(--white-ghost); padding: 40px 24px 24px; }
            .panel-left::after { display: none; }
            .panel-right { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="top-rule"></div>

    <div id="recepcionistaCorner">
        <div class="corner-avatar" id="cornerAvatar">—</div>
        <div class="corner-info">
            <span class="corner-label">Recepción</span>
            <span class="corner-name" id="cornerName">Sin asignar</span>
        </div>
    </div>

    <div class="container">

        <!-- Conectando -->
        <div id="connectingState">
            <div class="spinner-ring"></div>
            <span class="connecting-label">Conectando</span>
        </div>

        <!-- Pendiente -->
        <div id="pendingState">
            <div class="pending-header">Código de vinculación</div>
            <div class="codigo-frame">
                <div id="codigoVinculacion">——————</div>
            </div>
            <p class="pending-subtitle">
                Ingresa este código en el<br>panel de administrador
            </p>
        </div>

        <!-- Vinculada: layout dividido -->
        <div id="linkedState">
            <div class="screen-split">

                <!-- IZQUIERDA: turno actual -->
                <div class="panel-left">
                    <!-- Sin paciente llamado -->
                    <div class="idle-state" id="idleState">
                        <div class="idle-icon">◈</div>
                        <div class="idle-text">Esperando llamada</div>
                    </div>

                    <!-- Turno activo -->
                    <div id="turnoActivo" style="display:none; flex-direction:column; align-items:center;">
                        <div class="left-label" id="turnoLabel">Turno llamado</div>
                        <div class="turno-codigo" id="turnoCodigo"></div>
                        <div class="gold-divider" id="goldDivider"></div>
                        <div class="turno-nombre" id="turnoNombre"></div>
                    </div>
                </div>

                <!-- DERECHA: historial -->
                <div class="panel-right">
                    <div class="history-header">
                        <span class="history-title">Llamados anteriores</span>
                        <span class="history-count" id="historyCount">0</span>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty" id="historyEmpty">
                            <div class="history-empty-icon">◇</div>
                            <div class="history-empty-text">Sin registros aún</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Error -->
        <div id="errorMessage"></div>
    </div>

    <div class="status-bar">
        <div>
            <span class="status-dot" id="conexionDot"></span>
            <span class="status-text-bar">Sistema de Turnos</span>
        </div>
        <div id="ultimaActualizacion" class="status-text-bar">—</div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/screen_vinculacion.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screen_turnos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
