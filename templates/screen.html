<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Turnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/screen.css') }}">
</head>
<body>

    <script>
        // FIX #6: el código de vinculación SOLO vive en el modal del admin.
        // En esta pantalla solo se muestra el número de código en el estado
        // "pendiente" para que el admin lo ingrese. No se expone en linkedState.
        const numeroRecepcionServidor = "{{ numero_recepcion }}" || '1';
        const urlParams = new URLSearchParams(window.location.search);
        let numeroRecepcion = urlParams.get('recepcion') || numeroRecepcionServidor || '1';
    </script>

    <!-- Línea dorada superior -->
    <div class="top-rule"></div>

    <!--
        FIX #1 y #3: #recepcionistaCorner está en el HTML para compatibilidad
        con screen_vinculacion.js, pero el CSS lo oculta con display:none !important.
        No aparecerá nunca, ni antes ni después de vincular.
    -->
    <div id="recepcionistaCorner" aria-hidden="true">
        <span class="corner-name" id="cornerName"></span>
    </div>

    <div class="container">

        <!-- Estado 1: Conectando al servidor -->
        <div id="connectingState">
            <div class="spinner-ring"></div>
            <span class="connecting-label">Conectando</span>
        </div>

        <!-- Estado 2: Esperando vinculación — muestra código para el admin -->
        <div id="pendingState">
            <div class="pending-header">Código de vinculación</div>
            <div class="codigo-frame">
                <div id="codigoVinculacion">——————</div>
            </div>
            <p class="pending-subtitle">
                Ingresa este código en el<br>panel de administrador
            </p>
        </div>

        <!-- Estado 3: Pantalla vinculada — layout turnos + publicidad -->
        <div id="linkedState">
            <div class="screen-split">

                <!-- ZONA SUPERIOR: paneles de turno (65%) -->
                <div class="zona-turnos">
                    <div id="multiPanelContainer" class="multi-panel-grid layout-1">
                        <!-- Construido dinámicamente por screen_turnos.js -->
                    </div>
                </div>

                <!-- Separador áureo entre zonas -->
                <div class="zona-separador"></div>

                <!-- ZONA INFERIOR: publicidad (35%) -->
                <div class="zona-publicidad">
                    <div class="pub-placeholder">
                        <span class="pub-label">Publicidad</span>
                        <!--
                            ═══════════════════════════════════════════════
                              ZONA DE PUBLICIDAD — Reemplaza pub-content:
                              <img src="/static/img/banner.jpg" style="width:100%;height:100%;object-fit:cover">
                              <video src="/static/video/clip.mp4" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover">
                              <iframe src="https://tu-url.com" style="width:100%;height:100%;border:none">
                            ═══════════════════════════════════════════════
                        -->
                        <div class="pub-content" id="zonaPublicidad">
                            Espacio publicitario
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Mensaje de error -->
        <div id="errorMessage"></div>

    </div>

    <!-- Barra de estado inferior -->
    <div class="status-bar">
        <div style="display:flex;align-items:center;">
            <span class="status-dot" id="conexionDot"></span>
            <span class="status-text-bar">Sistema de Turnos</span>
        </div>
        <div id="ultimaActualizacion" class="status-text-bar">—</div>
    </div>

    <!-- Scripts: Socket primero, luego vinculacion, luego turnos -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/screen_vinculacion.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screen_turnos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>
</html>
