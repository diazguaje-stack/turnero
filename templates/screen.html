<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Turnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/screen.css') }}">

</head>
<body>
    <script>
        const numeroRecepcionServidor = "{{ numero_recepcion }}" || '1';
        const urlParams = new URLSearchParams(window.location.search);
        let numeroRecepcion = urlParams.get('recepcion') || numeroRecepcionServidor || '1';
        
        if (!urlParams.has('recepcion') && numeroRecepcion) {
            window.history.replaceState({}, document.title, 
                `${window.location.pathname}?recepcion=${numeroRecepcion}`);
        }
    </script>
    
    <div class="top-rule"></div>


    <div id="recepcionistaCorner">
        <span class="corner-name" id="cornerName">Sin asignar</span>
    </div>

    <div class="container">

        <!-- Conectando -->
        <div id="connectingState">
            <div class="spinner-ring"></div>
            <span class="connecting-label">Conectando</span>
        </div>

        <!-- Pendiente -->
         
        <div id="pendingState">
            <div class="pending-header">Código de vinculación</div>
            <div class="codigo-frame">
                <div id="codigoVinculacion">——————</div>
            </div>
            <p class="pending-subtitle">
                Ingresa este código en el<br>panel de administrador
            </p>
        </div>

        <!-- Vinculada: layout dividido -->
        <div id="linkedState">
            <div class="screen-split">

                <!-- IZQUIERDA: turno actual -->
                <div class="panel-left">
                    <!-- Sin paciente llamado -->
                    <div class="idle-state" id="idleState">
                        <div class="idle-icon">◈</div>
                        <div class="idle-text">Esperando llamada</div>
                    </div>

                    <!-- Turno activo -->
                    <div id="turnoActivo" style="display:none; flex-direction:column; align-items:center;">
                        <div class="left-label" id="turnoLabel">Turno llamado</div>
                        <div class="turno-codigo" id="turnoCodigo"></div>
                        <div class="gold-divider" id="goldDivider"></div>
                        <div class="turno-nombre" id="turnoNombre"></div>
                    </div>
                </div>

                <!-- DERECHA: historial -->
                <div class="panel-right">
                    <div class="history-header">
                        <span class="history-title">Llamados anteriores</span>
                        <span class="history-count" id="historyCount">0</span>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty" id="historyEmpty">
                            <div class="history-empty-icon">◇</div>
                            <div class="history-empty-text">Sin registros aún</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Error -->
        <div id="errorMessage"></div>
    </div>

    <div class="status-bar">
        <div>
            <span class="status-dot" id="conexionDot"></span>
            <span class="status-text-bar">Sistema de Turnos</span>
        </div>
        <div id="ultimaActualizacion" class="status-text-bar">—</div>
    </div>

    
    <script src="/static/js/screen_turnos.js"></script> 
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/screen_vinculacion.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screen_turnos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
