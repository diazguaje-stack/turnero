<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Turnos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/screen.css') }}">
</head>
<body>

    <script>
        // Número de recepción legacy (no se usa activamente en v2, pero evita errores)
        const numeroRecepcionServidor = "{{ numero_recepcion }}" || '1';
        const urlParams = new URLSearchParams(window.location.search);
        let numeroRecepcion = urlParams.get('recepcion') || numeroRecepcionServidor || '1';
    </script>

    <div class="top-rule"></div>

    <!-- Nombre de recepción(es) en esquina superior -->
    <div id="recepcionistaCorner">
        <span class="corner-name" id="cornerName">Sin asignar</span>
    </div>

    <div class="container">

        <!-- Estado: Conectando -->
        <div id="connectingState">
            <div class="spinner-ring"></div>
            <span class="connecting-label">Conectando</span>
        </div>

        <!-- Estado: Pendiente de vinculación -->
        <div id="pendingState">
            <div class="pending-header">Código de vinculación</div>
            <div class="codigo-frame">
                <div id="codigoVinculacion">——————</div>
            </div>
            <p class="pending-subtitle">
                Ingresa este código en el<br>panel de administrador
            </p>
        </div>

        <!-- Estado: Vinculada — multipanel ocupa TODA la pantalla -->
        <div id="linkedState">
            <div id="multiPanelContainer" class="multi-panel-grid layout-1">
                <!-- Construido dinámicamente por screen_turnos.js -->
            </div>
        </div>

        <!-- Error -->
        <div id="errorMessage"></div>

    </div>

    <!-- Barra de estado inferior -->
    <div class="status-bar">
        <div>
            <span class="status-dot" id="conexionDot"></span>
            <span class="status-text-bar">Sistema de Turnos</span>
        </div>
        <div id="ultimaActualizacion" class="status-text-bar">—</div>
    </div>

    <!-- Scripts — Socket.io PRIMERO, luego vinculacion, luego turnos -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/screen_vinculacion.js') }}"></script>
    <script src="{{ url_for('static', filename='js/screen_turnos.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>
</html>
