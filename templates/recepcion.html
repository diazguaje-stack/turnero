<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Pacientes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/recepcion.css') }}">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>
            <h1>🏥 Recepción - Pacientes</h1>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div class="user-name">
                <span class="user-name-label">Sesión iniciada como</span>
                <span class="user-name-value" id="userName">Cargando...</span>
            </div>
            <div class="navbar-buttons">
                <button onclick="abrirHistorialLlamados()" style="
                    position:relative;
                    background:rgba(79,142,247,0.1); border:1px solid rgba(79,142,247,0.3);
                    color:#4f8ef7; border-radius:8px; padding:8px 16px;
                    font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px;
                    transition:all 0.2s;
                " onmouseover="this.style.background='rgba(79,142,247,0.2)'" onmouseout="this.style.background='rgba(79,142,247,0.1)'">
                    📋 Historial
                    <span id="historialBadge" style="
                        display:none; background:#ef4444; color:white;
                        border-radius:20px; padding:1px 7px; font-size:11px; font-weight:700;
                    ">0</span>
                </button>
                <button class="papelera-btn" onclick="abrirPapelera()">🗑️ Papelera</button>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="container">
        <div id="medicosContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando pacientes...</p>
            </div>
        </div>
    </div>

    <!-- Modal de Detalles -->
    <div id="detallesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalles del Paciente</h2>
                <button class="close-btn" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body" id="detallesContent"></div>
        </div>
    </div>

    <!-- Modal de Papelera -->
    <div id="papeleraModal" class="modal">
        <div class="modal-content">
            <div class="papelera-header">
                <h2>🗑️ Papelera de Códigos Eliminados</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-vaciar" onclick="vaciarPapelera()">Vaciar Todo</button>
                    <button class="close-btn" onclick="cerrarPapelera()">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="papeleraBody"></div>
        </div>
    </div>

    <!-- Modal Historial de Llamados -->
    <div id="historialModal" style="
        display:none; position:fixed; inset:0; z-index:1000;
        background:rgba(5,13,26,0.85); backdrop-filter:blur(12px);
        justify-content:center; align-items:center; padding:20px;
    ">
        <div style="
            background:#091428; border:1px solid rgba(79,142,247,0.2);
            border-radius:12px; width:100%; max-width:600px;
            max-height:80vh; display:flex; flex-direction:column;
            box-shadow:0 24px 64px rgba(0,0,0,0.6);
            overflow:hidden;
        ">
            <div style="
                display:flex; align-items:center; justify-content:space-between;
                padding:24px 28px; border-bottom:1px solid rgba(255,255,255,0.07);
                flex-shrink:0;
            ">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span style="font-size:20px;">📋</span>
                    <div>
                        <h3 style="font-size:16px; color:#f0f4ff; font-weight:600; letter-spacing:0.03em;">Historial de llamados</h3>
                        <p style="font-size:12px; color:rgba(240,244,255,0.4); margin-top:2px;">Pacientes llamados en esta sesión</p>
                    </div>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button onclick="limpiarHistorialLlamados()" style="
                        background:rgba(220,38,38,0.15); border:1px solid rgba(220,38,38,0.3);
                        color:#fca5a5; border-radius:6px; padding:7px 14px;
                        font-size:12px; cursor:pointer; letter-spacing:0.05em;
                    " onmouseover="this.style.background='rgba(220,38,38,0.25)'" onmouseout="this.style.background='rgba(220,38,38,0.15)'">
                        🗑️ Limpiar
                    </button>
                    <button onclick="cerrarHistorialLlamados()" style="
                        background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
                        color:#f0f4ff; border-radius:6px; padding:7px 14px;
                        font-size:12px; cursor:pointer;
                    " onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                        ✕ Cerrar
                    </button>
                </div>
            </div>
            <div id="historialBody" style="flex:1; overflow-y:auto; padding:20px 24px;"></div>
        </div>
    </div>

    <style>
    @keyframes fadeInItem {
        from { opacity:0; transform:translateX(-10px); }
        to   { opacity:1; transform:translateX(0); }
    }
    </style>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/recepcion.js') }}"></script>
</body>
</html>
